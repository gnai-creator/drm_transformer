# ~350M params - GPT-2 Medium equivalent
vocab_size: 50257
d_model: 1024
n_heads: 16
n_layers: 24
d_ff: 4096
max_seq_len: 1024
dropout: 0.1
bias: false
batch_size: 16
learning_rate: 0.0003
warmup_steps: 2000
total_tokens: 7_000_000_000
mixed_precision: bf16
gradient_accumulation_steps: 8
gradient_checkpointing: false
eval_interval: 500
early_stopping_patience: 10

# --- Manifold DRM ---
d_manifold: 16
metric_hidden: 64
n_quad: 0

# --- Gamma-Scaling ---
gamma_enabled: true
gamma_c: 4.0

# --- Gravidade ---
gravity_enabled: true
gravity_strength: 0.05
gravity_n_rff: 64
n_anchors: 6

# --- Dimensionalidade variavel ---
variable_dim: true

# --- Losses DRM ---
lambda_metric_reg: 0.001
lambda_metric_diversity: 0.05
metric_diversity_warmup_steps: 5000
save_dir: checkpoints/350m
save_interval: 500
log_interval: 50
target_metric_var: 0.001
save_total_limit: 5
temperature_min: 0.5
