# ~1.3B params - Llama-2-1.3B equivalent [multilingual o200k_base 50K]
vocab_size: 50000
d_model: 2048
n_heads: 16
n_layers: 24
d_ff: 5504
max_seq_len: 2048
dropout: 0.0
bias: false
batch_size: 4
learning_rate: 0.0003
warmup_steps: 2000
total_tokens: 50_000_000_000
mixed_precision: bf16
gradient_accumulation_steps: 32
gradient_checkpointing: true
distributed: true
eval_interval: 500
early_stopping_patience: 10

# --- Manifold DRM ---
d_manifold: 20
metric_hidden: 80
n_quad: 0

# --- Gamma-Scaling ---
gamma_enabled: true
gamma_c: 4.47

# --- Gravidade ---
gravity_enabled: true
gravity_strength: 0.03

# --- Dimensionalidade variavel ---
variable_dim: true

# --- Losses DRM ---
lambda_metric_reg: 0.0005
lambda_metric_diversity: 0.03
metric_diversity_warmup_steps: 10000
save_dir: checkpoints/multilingual_1.3b
save_interval: 500
log_interval: 50
