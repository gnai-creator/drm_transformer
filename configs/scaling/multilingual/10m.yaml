# ~10M params - GPU consumer [multilingual o200k_base 50K]
vocab_size: 50000
d_model: 160
n_heads: 4
n_layers: 6
d_ff: 640
max_seq_len: 512
dropout: 0.1
bias: false
batch_size: 8
learning_rate: 0.0006
warmup_steps: 500
total_tokens: 200_000_000
mixed_precision: bf16
gradient_accumulation_steps: 4
eval_interval: 500
early_stopping_patience: 5

# --- Manifold DRM ---
d_manifold: 6
metric_hidden: 24
metric_rank: 4
n_quad: 0

# --- Gamma-Scaling ---
gamma_enabled: true
gamma_c: 2.83

# --- Gravidade ---
gravity_enabled: true
gravity_strength: 0.1
gravity_n_rff: 64
n_anchors: 6

# --- Dimensionalidade variavel ---
variable_dim: true

# --- Losses DRM ---
lambda_metric_reg: 0.001
lambda_metric_diversity: 0.03
lambda_ortho: 0.01
metric_diversity_warmup_steps: 2500
save_dir: checkpoints/multilingual_10m/run_1
save_interval: 500
log_interval: 50
target_metric_var: 0.001
save_total_limit: 5
temperature_min: 0.5