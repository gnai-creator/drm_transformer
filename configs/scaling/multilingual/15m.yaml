# ~15M params - Validacao rapida em GPU consumer [multilingual o200k_base 50K]
vocab_size: 50000
d_model: 256
n_heads: 4
n_layers: 6
d_ff: 1024
max_seq_len: 512
dropout: 0.1
bias: false
batch_size: 4
learning_rate: 0.0006
warmup_steps: 500
total_tokens: 500_000_000
mixed_precision: bf16
gradient_accumulation_steps: 8
eval_interval: 500
early_stopping_patience: 5

# --- Manifold DRM ---
d_manifold: 8
metric_hidden: 32
n_quad: 0

# --- Gamma-Scaling ---
gamma_enabled: true
gamma_c: 2.83

# --- Gravidade ---
gravity_enabled: true
gravity_strength: 0.1
gravity_n_rff: 64
n_anchors: 6

# --- Dimensionalidade variavel ---
variable_dim: true

# --- Losses DRM ---
lambda_metric_reg: 0.001
lambda_metric_diversity: 0.01
metric_diversity_warmup_steps: 2000
save_dir: checkpoints/multilingual_15m/run_1
save_interval: 500
log_interval: 50
target_metric_var: 0.001
save_total_limit: 5
temperature_min: 0.5
