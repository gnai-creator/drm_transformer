# ~640B params - Extreme scale (MoE candidate) [multilingual o200k_base 50K]
vocab_size: 50000
d_model: 16384
n_heads: 128
n_layers: 126
d_ff: 65536
max_seq_len: 8192
dropout: 0.0
bias: false
batch_size: 1
learning_rate: 0.00006
warmup_steps: 4000
total_tokens: 10_000_000_000_000
mixed_precision: bf16
gradient_accumulation_steps: 512
gradient_checkpointing: true
distributed: true
fsdp: true
fsdp_sharding: full
compile_model: true
eval_interval: 1000
early_stopping_patience: 10

# --- Manifold DRM ---
d_manifold: 40
metric_hidden: 160
metric_rank: 10
n_quad: 0

# --- Gamma-Scaling ---
gamma_enabled: true
gamma_c: 6.32

# --- Gravidade ---
gravity_enabled: true
gravity_strength: 0.005
gravity_n_rff: 64
n_anchors: 6

# --- Dimensionalidade variavel ---
variable_dim: true

# --- Losses DRM ---
lambda_metric_reg: 0.00005
lambda_metric_diversity: 0.005
lambda_ortho: 0.01
metric_diversity_warmup_steps: 100000
save_dir: checkpoints/multilingual_640b
save_interval: 500
log_interval: 50
target_metric_var: 0.001
save_total_limit: 5
temperature_min: 0.5
