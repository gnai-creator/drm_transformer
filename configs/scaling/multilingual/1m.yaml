# ~1M params - Smoke test / debug [multilingual o200k_base 50K]
vocab_size: 50000
d_model: 64
n_heads: 2
n_layers: 4
d_ff: 256
max_seq_len: 256
dropout: 0.1
bias: false
batch_size: 16
learning_rate: 0.001
warmup_steps: 100
total_tokens: 10_000_000
mixed_precision: none
gradient_accumulation_steps: 1
eval_interval: 500

# --- Manifold DRM ---
d_manifold: 4
metric_hidden: 16
metric_rank: 2
n_quad: 0

# --- Gamma-Scaling ---
gamma_enabled: true
gamma_c: 2.0

# --- Gravidade ---
gravity_enabled: true
gravity_strength: 0.1
gravity_n_rff: 64
n_anchors: 6

# --- Dimensionalidade variavel ---
variable_dim: true

# --- Losses DRM ---
lambda_metric_reg: 0.001
lambda_metric_diversity: 0.01
lambda_ortho: 0.01
metric_diversity_warmup_steps: 2000
save_dir: checkpoints/multilingual_1m/run_1
save_interval: 500
log_interval: 50
target_metric_var: 0.001
save_total_limit: 5
temperature_min: 0.5
